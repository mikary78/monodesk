# ============================================================
# render.yaml — Render 배포 설정
# https://render.com/docs/blueprint-spec
# ============================================================

services:
  # ── 백엔드 (FastAPI) ──────────────────────────────────────
  - type: web
    name: monodesk-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false          # Render 대시보드에서 직접 입력
      - key: SECRET_KEY
        sync: false          # Render 대시보드에서 직접 입력
      - key: DATABASE_URL
        value: sqlite:///./monodesk.db
      - key: ALLOWED_ORIGINS
        sync: false          # 프론트엔드 URL (예: https://monodesk-frontend.onrender.com)

  # ── 프론트엔드 (React Static Site) ───────────────────────
  - type: web
    name: monodesk-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        sync: false          # 백엔드 URL (예: https://monodesk-backend.onrender.com)
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
